<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Agro Sustentável</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>🌱 Quiz Agro Sustentável</h1>
    <p class="subtitulo">Responda antes que o tempo acabe!</p>

    <div class="topo">
        <p>⏱️ Tempo: <span id="tempo">60</span>s</p>
        <p>📋 Pergunta <span id="numero">1</span>/10</p>
        <p>⭐ Pontos: <span id="pontos">0</span></p>
    </div>

    <div id="quiz">
        <h2 id="pergunta"></h2>
        <div id="opcoes"></div>
    </div>

    <div id="resultado" class="oculto"></div>
</div>

<script src="js/script.js"></script>
</body>
</html>
